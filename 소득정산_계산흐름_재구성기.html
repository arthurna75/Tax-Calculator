<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소득정산 계산흐름 재구성기</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "맑은 고딕", "Malgun Gothic", -apple-system, sans-serif;
    background: linear-gradient(135deg, #f5f7fb 0%, #e8eef8 100%);
    margin: 0; padding: 40px 20px; color: #222; min-height: 100vh;
  }
  .container { max-width: 880px; margin: 0 auto; }
  header {
    background: linear-gradient(135deg, #1F4E78 0%, #2E75B6 100%);
    color: #fff; padding: 32px 36px; border-radius: 16px 16px 0 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  header h1 { margin: 0 0 8px 0; font-size: 26px; }
  header p  { margin: 0; opacity: 0.92; font-size: 15px; line-height: 1.5; }
  .panel {
    background: #fff; padding: 32px 36px; border-radius: 0 0 16px 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .dropzone {
    border: 2.5px dashed #b6cce8; border-radius: 14px; padding: 48px 24px;
    text-align: center; cursor: pointer; transition: all .15s;
    background: #f9fbfd;
  }
  .dropzone:hover, .dropzone.drag { border-color: #2E75B6; background: #eef5fc; }
  .dropzone .icon { font-size: 48px; line-height: 1; margin-bottom: 12px; }
  .dropzone .main { font-size: 17px; font-weight: 600; color: #1F4E78; margin-bottom: 6px; }
  .dropzone .sub  { font-size: 13px; color: #6a7a8c; }
  input[type=file] { display: none; }
  .filename {
    margin-top: 18px; padding: 12px 16px; background: #eef5fc;
    border-radius: 10px; font-size: 14px; color: #1F4E78;
    display: none;
  }
  .filename.show { display: block; }
  .actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  button {
    border: none; padding: 14px 26px; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  button.primary { background: #2E75B6; color: #fff; }
  button.primary:hover:not(:disabled) { background: #1F4E78; }
  button.primary:disabled { background: #b8c5d4; cursor: not-allowed; }
  button.success { background: #2e7d32; color: #fff; }
  button.success:hover:not(:disabled) { background: #1b5e20; }
  button.success:disabled { background: #c8d3c8; cursor: not-allowed; }
  button.ghost { background: #f0f3f7; color: #5a6878; }
  button.ghost:hover { background: #e5ebf2; }
  .status {
    margin-top: 22px; padding: 16px 20px; border-radius: 10px;
    font-size: 14px; line-height: 1.55; display: none;
  }
  .status.show { display: block; }
  .status.ok    { background: #e2efda; color: #2e5e1f; border-left: 4px solid #4caf50; }
  .status.err   { background: #fce4e4; color: #8b2020; border-left: 4px solid #e53935; }
  .status.info  { background: #fff2cc; color: #6b5400; border-left: 4px solid #f5b941; }
  .preview {
    margin-top: 22px; display: none;
    border: 1px solid #e1e8ef; border-radius: 10px; overflow: hidden;
  }
  .preview.show { display: block; }
  .preview h3 {
    margin: 0; padding: 12px 18px; background: #1F4E78;
    color: #fff; font-size: 14px; font-weight: 600;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 14px; text-align: left; border-bottom: 1px solid #eef1f5; }
  th { background: #f7f9fc; font-weight: 600; color: #4a5868; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: #1F4E78; }
  td.neg { color: #c0392b; }
  .footer-note {
    margin-top: 24px; padding: 16px 20px; background: #f7f9fc;
    border-radius: 10px; font-size: 12.5px; color: #5a6878; line-height: 1.6;
  }
  .footer-note strong { color: #1F4E78; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>소득정산 계산흐름 재구성기</h1>
    <p>국세청 연말정산 기초자료(.xlsx)를 업로드하면 9단계 계산 흐름과 카드 초과사용 분석이 포함된 보기 좋은 엑셀을 만들어 드립니다.</p>
  </header>
  <div class="panel">
    <label class="dropzone" id="dropzone" for="fileInput">
      <div class="icon">📊</div>
      <div class="main">엑셀 파일을 끌어다 놓거나 클릭하여 선택</div>
      <div class="sub">소득정산기초자료(년도).xlsx 형식의 파일을 선택해 주세요</div>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </label>
    <div class="filename" id="filename"></div>

    <div class="actions">
      <button class="primary" id="processBtn" disabled>🔄 변환하기</button>
      <button class="success" id="downloadBtn" disabled>📥 결과 파일 다운로드</button>
      <button class="ghost" id="resetBtn">초기화</button>
    </div>

    <div class="status" id="status"></div>

    <div class="preview" id="preview">
      <h3>주요 항목 추출 결과 (미리보기)</h3>
      <table id="previewTable"></table>
    </div>

    <div class="footer-note">
      <strong>처리 방식</strong> · 업로드된 파일은 브라우저 안에서만 처리되며 외부 서버로 전송되지 않습니다.<br>
      <strong>입력 형식</strong> · 첫 번째 시트에 "정산항목코드"·"처리금액" 열이 있는 모든 파일을 인식합니다.<br>
      <strong>출력</strong> · 9개 시트(한눈에보기·총급여·근로소득·소득공제·신용카드공제·과세표준·세액공제·환급·초과사용액분석)로 구성된 .xlsx 파일을 생성합니다.
    </div>
  </div>
</div>

<script>
const FONT_KR = "맑은 고딕";

function S(opts) {
  const s = {};
  s.font = { name: FONT_KR, sz: opts.size || 11 };
  if (opts.bold)   s.font.bold = true;
  if (opts.italic) s.font.italic = true;
  if (opts.color)  s.font.color = { rgb: opts.color };
  if (opts.fill)   s.fill = { patternType: "solid", fgColor: { rgb: opts.fill } };
  if (opts.align)  s.alignment = { ...opts.align, wrapText: true };
  if (opts.fmt)    s.numFmt = opts.fmt;
  if (opts.border) {
    const t = { style: "thin", color: { rgb: "BFBFBF" } };
    s.border = { top: t, bottom: t, left: t, right: t };
  }
  return s;
}

const TITLE_STYLE  = S({ bold:true, size:16, color:"FFFFFF", fill:"1F4E78", align:{horizontal:"center",vertical:"center"} });
const STEP_STYLE   = S({ bold:true, size:12, color:"FFFFFF", fill:"2E75B6", align:{horizontal:"center",vertical:"center"} });
const HEAD_STYLE   = S({ bold:true, size:11, color:"FFFFFF", fill:"305496", align:{horizontal:"center",vertical:"center"}, border:true });
const SUB_FILL     = "D9E1F2";
const RESULT_FILL  = "FFF2CC";
const FINAL_FILL   = "FCE4D6";

const ALIGN_C = { horizontal:"center", vertical:"center" };
const ALIGN_L = { horizontal:"left",   vertical:"center", indent:1 };
const ALIGN_R = { horizontal:"right",  vertical:"center" };

// 수식으로 인식할 수 있는 패턴: "="로 시작하고 두 번째 문자가 영문/괄호/숫자/시트참조 부호
function looksLikeFormula(s) {
  if (typeof s !== "string" || !s.startsWith("=") || s.length < 2) return false;
  const c2 = s.charCodeAt(1);
  // A-Z, a-z, (, ', SUM 류, 디지트
  return (c2 >= 65 && c2 <= 90) || (c2 >= 97 && c2 <= 122) || c2 === 40 || c2 === 39 || (c2 >= 48 && c2 <= 57);
}
function setCell(ws, addr, value, style) {
  const cell = { v: value };
  if (looksLikeFormula(value)) {
    cell.f = value.slice(1); cell.v = 0; cell.t = "n";
  } else if (typeof value === "number") { cell.t = "n"; }
  else { cell.t = "s"; }
  if (style) cell.s = style;
  ws[addr] = cell;
}
function setRange(ws, range) { ws["!ref"] = range; }
function mergeCells(ws, range) {
  if (!ws["!merges"]) ws["!merges"] = [];
  ws["!merges"].push(XLSX.utils.decode_range(range));
}
function setCols(ws, widths) { ws["!cols"] = widths.map(w => ({ wch: w })); }
function setRowHeight(ws, row, h) {
  if (!ws["!rows"]) ws["!rows"] = [];
  ws["!rows"][row - 1] = { hpt: h };
}

function parseInput(workbook) {
  const map = {};
  let foundAnywhere = false;
  for (const sn of workbook.SheetNames) {
    const ws = workbook.Sheets[sn];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    if (!rows.length) continue;
    let headerRow = -1, codeCol = -1, valCol = -1;
    for (let r = 0; r < Math.min(rows.length, 10); r++) {
      const row = rows[r] || [];
      for (let c = 0; c < row.length; c++) {
        const v = String(row[c] || "").trim();
        if (v === "정산항목코드") { codeCol = c; headerRow = r; }
        if (v === "처리금액")     { valCol  = c; }
      }
      if (headerRow >= 0 && codeCol >= 0 && valCol >= 0) break;
    }
    if (headerRow < 0 || codeCol < 0 || valCol < 0) continue;
    foundAnywhere = true;
    for (let r = headerRow + 1; r < rows.length; r++) {
      const row = rows[r] || [];
      const code = String(row[codeCol] || "").trim();
      let val = row[valCol];
      if (!code) continue;
      if (val === null || val === undefined || val === "") val = 0;
      if (typeof val === "string") val = Number(val.replace(/,/g, "")) || 0;
      if (!(code in map) || map[code] === 0) map[code] = val;
    }
  }
  if (!foundAnywhere) throw new Error("'정산항목코드' 또는 '처리금액' 열을 찾을 수 없습니다.");
  return map;
}

function num(m, code, fallback = 0) {
  const v = m[code];
  return (typeof v === "number") ? v : fallback;
}

function buildOutput(d) {
  const wb = XLSX.utils.book_new();
  const v = (c) => num(d, c);

  // ---------- Sheet 1: 한눈에보기 ----------
  {
    const ws = {};
    setCols(ws, [4, 38, 4, 22, 4, 38]);
    setCell(ws, "B2", "2025년도 연말정산 — 계산 흐름 한눈에 보기", TITLE_STYLE);
    mergeCells(ws, "B2:F2"); setRowHeight(ws, 2, 32);

    setCell(ws, "B4", "■ 최종 결과 — 환급/납부", STEP_STYLE); mergeCells(ws, "B4:F4");
    const finalL = S({ bold:true, size:11, fill:FINAL_FILL, align:ALIGN_L });
    setCell(ws, "B5", "차감_소득세 (환급/추가납부)", finalL);
    setCell(ws, "D5", v("G910"), S({ size:11, color:"0000FF", fill:FINAL_FILL, align:ALIGN_R, fmt:'#,##0"원";[Red](#,##0"원")' }));
    setCell(ws, "B6", "차감_지방소득세 (환급/추가납부)", finalL);
    setCell(ws, "D6", v("G911"), S({ size:11, color:"0000FF", fill:FINAL_FILL, align:ALIGN_R, fmt:'#,##0"원";[Red](#,##0"원")' }));
    setCell(ws, "B7", "총 환급(△)/납부 합계", finalL);
    setCell(ws, "D7", "=D5+D6", S({ bold:true, size:12, color:"C00000", fill:FINAL_FILL, align:ALIGN_R, fmt:'#,##0"원";[Red](#,##0"원")' }));

    setCell(ws, "B9", "■ 8단계 계산 흐름", STEP_STYLE); mergeCells(ws, "B9:F9");
    const subL = S({ bold:true, fill:SUB_FILL, align:ALIGN_L });
    const flow = [
      ["①", "급여+상여 = 소득총액",                       v("S001") + v("S002")],
      ["②", "소득총액 − 비과세 = 총급여액",              v("S030")],
      ["③", "총급여 − 근로소득공제 = 근로소득",          v("S301")],
      ["④", "근로소득 − 소득공제 = 과세표준",            v("G211")],
      ["⑤", "과세표준 × 세율 = 산출세액",                 v("G212")],
      ["⑥", "산출세액 − 세액공제 = 결정세액(소득세)",    v("G901")],
      ["⑦", "결정세액 × 10% = 지방소득세",                v("G902")],
      ["⑧", "결정 − 기납부 = 차감징수세액",              v("G910")],
    ];
    let r = 10;
    flow.forEach(([s, desc, val]) => {
      setCell(ws, `B${r}`, `  ${s}  ${desc}`, subL); mergeCells(ws, `B${r}:E${r}`);
      setCell(ws, `F${r}`, val, S({ bold:true, color:"0000FF", size:12, fill:SUB_FILL, align:ALIGN_R, fmt:'#,##0' }));
      r++;
    });
    r++;
    setCell(ws, `B${r}`,
      "※ 각 단계의 상세 계산은 시트 2~7에서, 카드 사용 효율 분석은 시트 8에서 확인할 수 있습니다. 파란색 셀(입력)을 바꾸면 결과가 자동 재계산됩니다.",
      S({ italic:true, size:10, color:"555555", align:{horizontal:"left",vertical:"center"} }));
    mergeCells(ws, `B${r}:F${r}`); setRowHeight(ws, r, 30);
    setRange(ws, `A1:F${r+1}`);
    XLSX.utils.book_append_sheet(wb, ws, "1.한눈에보기");
  }

  // ---------- Sheet 2: 총급여 ----------
  {
    const ws = {};
    setCols(ws, [4, 6, 30, 22, 30]);
    setCell(ws, "B2", "STEP 1.  총급여액 계산", TITLE_STYLE); mergeCells(ws, "B2:E2"); setRowHeight(ws, 2, 28);
    ["부호","항목","금액(원)","설명"].forEach((h, i) => setCell(ws, `${"BCDE"[i]}4`, h, HEAD_STYLE));
    const rows = [
      ["+", "급여소득 (S001)",      v("S001"),    "기본 급여"],
      ["+", "상여소득 (S002)",      v("S002"),    "각종 상여금"],
      ["=", "소득총액 (S004)",      "=D5+D6",     "급여 + 상여"],
      ["−", "비과세 — 자가운전 (S013)", v("S013"),"월 20만원 한도 비과세"],
      ["=", "비과세 합계 (S019)",   "=D8",        "비과세 항목 합계"],
      ["=", "총급여액 (S030)",      "=D7-D9",     "▶ 다음 단계의 출발점"],
    ];
    let r = 5;
    rows.forEach(([sign, name, val, note]) => {
      const isSum = (sign === "=");
      const isFinal = (r === 10);
      const fill = isFinal ? FINAL_FILL : (isSum ? RESULT_FILL : undefined);
      const big = isFinal;
      const fontC = (typeof val === "number") ? "0000FF" : "000000";
      setCell(ws, `B${r}`, sign, S({ fill, align:ALIGN_C, border:true, bold:isSum, size: big?12:11 }));
      setCell(ws, `C${r}`, name, S({ fill, align:ALIGN_L, border:true, bold:isSum, size: big?12:11 }));
      setCell(ws, `D${r}`, val,  S({ fill, align:ALIGN_R, border:true, bold:isSum, color:fontC, size: big?12:11, fmt:'#,##0' }));
      setCell(ws, `E${r}`, note, S({ fill, align:ALIGN_L, border:true, bold:isSum, size: big?12:11 }));
      r++;
    });
    setRange(ws, "A1:E11");
    XLSX.utils.book_append_sheet(wb, ws, "2.총급여");
  }

  // ---------- Sheet 3: 근로소득 ----------
  {
    const ws = {};
    setCols(ws, [4, 6, 32, 22, 44]);
    setCell(ws, "B2", "STEP 2.  근로소득금액 계산", TITLE_STYLE); mergeCells(ws, "B2:E2"); setRowHeight(ws, 2, 28);
    ["부호","항목","금액(원)","설명"].forEach((h, i) => setCell(ws, `${"BCDE"[i]}4`, h, HEAD_STYLE));
    const rows = [
      ["+", "총급여액 (이전 단계)", "='2.총급여'!D10",  "STEP 1 결과"],
      ["−", "근로소득공제 (G001)",  v("G001"),          "총급여 구간별 공제"],
      ["=", "근로소득금액 (S301)",  "=D5-D6",           "▶ 소득공제 적용 전 소득"],
    ];
    let r = 5;
    rows.forEach(([sign, name, val, note]) => {
      const isFinal = (sign === "=" && r === 7);
      const fill = isFinal ? FINAL_FILL : (sign === "=" ? RESULT_FILL : undefined);
      const big = isFinal;
      const fontC = (typeof val === "number") ? "0000FF" : "000000";
      setCell(ws, `B${r}`, sign, S({ fill, align:ALIGN_C, border:true, bold:isFinal, size: big?12:11 }));
      setCell(ws, `C${r}`, name, S({ fill, align:ALIGN_L, border:true, bold:isFinal, size: big?12:11 }));
      setCell(ws, `D${r}`, val,  S({ fill, align:ALIGN_R, border:true, bold:isFinal, color:fontC, size: big?12:11, fmt:'#,##0' }));
      setCell(ws, `E${r}`, note, S({ fill, align:ALIGN_L, border:true, bold:isFinal, size: big?12:11 }));
      r++;
    });
    setCell(ws, "B9", "참고 — 근로소득공제 산식 (2025년 기준)", STEP_STYLE); mergeCells(ws, "B9:E9");
    const brackets = [
      ["총급여 구간", "공제액"],
      ["500만원 이하",       "총급여 × 70%"],
      ["500만 ~ 1,500만원",   "350만 + (총급여−500만)×40%"],
      ["1,500만 ~ 4,500만원", "750만 + (총급여−1,500만)×15%"],
      ["4,500만 ~ 1억원",     "1,200만 + (총급여−4,500만)×5%"],
      ["1억원 초과",          "1,475만 + (총급여−1억)×2%"],
    ];
    r = 10;
    brackets.forEach((row, i) => {
      const fill = i === 0 ? SUB_FILL : undefined;
      const bold = i === 0;
      setCell(ws, `B${r}`, row[0], S({ fill, align:ALIGN_L, border:true, bold })); mergeCells(ws, `B${r}:C${r}`);
      setCell(ws, `D${r}`, row[1], S({ fill, align:ALIGN_L, border:true, bold })); mergeCells(ws, `D${r}:E${r}`);
      r++;
    });
    setRange(ws, "A1:E15");
    XLSX.utils.book_append_sheet(wb, ws, "3.근로소득");
  }

  // ---------- Sheet 4: 소득공제 ----------
  {
    const ws = {};
    setCols(ws, [4, 6, 34, 22, 38]);
    setCell(ws, "B2", "STEP 3.  소득공제 — 인적·특별·연금·기타", TITLE_STYLE); mergeCells(ws, "B2:E2"); setRowHeight(ws, 2, 28);
    function sh(r, title) {
      setCell(ws, `B${r}`, title, STEP_STYLE); mergeCells(ws, `B${r}:E${r}`);
    }
    function line(r, sign, name, amount, note, isTotal=false, isFinal=false) {
      const fill = isFinal ? FINAL_FILL : (isTotal ? RESULT_FILL : undefined);
      const big = isFinal;
      const fontC = (typeof amount === "number") ? "0000FF" : "000000";
      setCell(ws, `B${r}`, sign, S({ fill, align:ALIGN_C, border:true, bold:isTotal, size: big?12:11 }));
      setCell(ws, `C${r}`, name, S({ fill, align:ALIGN_L, border:true, bold:isTotal, size: big?12:11 }));
      setCell(ws, `D${r}`, amount, S({ fill, align:ALIGN_R, border:true, bold:isTotal, color:fontC, size: big?12:11, fmt:'#,##0' }));
      setCell(ws, `E${r}`, note, S({ fill, align:ALIGN_L, border:true, bold:isTotal, size: big?12:11 }));
    }
    let r = 4;
    sh(r, "① 인적공제 (G014)"); r++;

    setCell(ws, `B${r}`, "+", S({ align:ALIGN_C, border:true }));
    setCell(ws, `C${r}`, "30% 그룹 (현금영수증·직불·선불 + 문화체육 직불·현금)", S({ align:ALIGN_L, border:true }));
    setCell(ws, `D${r}`, cards30, S({ align:ALIGN_R, border:true, color:"0000FF", fmt:'#,##0' }));
    setCell(ws, `E${r}`, "G205 + G222 + G258 + G259", S({ align:ALIGN_L, border:true }));
    r++;
    setCell(ws, `B${r}`, "=", S({ align:ALIGN_C, border:true, bold:true, fill:RESULT_FILL, size:12 }));
    setCell(ws, `C${r}`, "일반 카드 사용 합계", S({ align:ALIGN_L, border:true, bold:true, fill:RESULT_FILL, size:12 }));
    setCell(ws, `D${r}`, cardsTotal, S({ align:ALIGN_R, border:true, bold:true, color:"0000FF", fmt:'#,##0', fill:RESULT_FILL, size:12 }));
    setCell(ws, `E${r}`, "한도 분석 대상 금액", S({ align:ALIGN_L, border:true, fill:RESULT_FILL, size:12, bold:true }));
    r++;

    r++;
    setCell(ws, `B${r}`, "■ 3. 한도 달성 분석", STEP_STYLE); mergeCells(ws, `B${r}:E${r}`); r++;
    setCell(ws, `B${r}`, "?", S({ align:ALIGN_C, border:true, fill:FINAL_FILL, bold:true }));
    setCell(ws, `C${r}`, "한도 달성에 필요한 최소 사용액", S({ align:ALIGN_L, border:true, bold:true, fill:FINAL_FILL, size:12 }));
    setCell(ws, `D${r}`, required, S({ align:ALIGN_R, border:true, bold:true, color:"0000FF", fmt:'#,##0', fill:FINAL_FILL, size:12 }));
    setCell(ws, `E${r}`, "→ 25% 문턱  +  (한도 ÷ 한계공제율 30%)", S({ align:ALIGN_L, border:true, fill:FINAL_FILL }));
    r++;
    setCell(ws, `B${r}`, "=", S({ align:ALIGN_C, border:true, bold:true, fill:FINAL_FILL, size:13 }));
    setCell(ws, `C${r}`, "초과 사용액 (세제혜택 없이 더 쓴 금액)", S({ align:ALIGN_L, border:true, bold:true, fill:FINAL_FILL, size:13 }));
    setCell(ws, `D${r}`, excess, S({ align:ALIGN_R, border:true, bold:true, color:"C00000", fmt:'#,##0;[Red](#,##0)', fill:FINAL_FILL, size:13 }));
    setCell(ws, `E${r}`,
      isCapped ? "한도 도달 — 이만큼 줄였어도 동일한 공제" : "한도 미도달 — 더 쓰면 추가 공제 가능",
      S({ align:ALIGN_L, border:true, fill:FINAL_FILL, size:12, bold:true }));
    r++;

    r++;
    setCell(ws, `B${r}`, "■ 참고 — 카드 사용 시나리오 비교", STEP_STYLE); mergeCells(ws, `B${r}:E${r}`); r++;
    const scenHdr = S({ bold:true, fill:SUB_FILL, align:ALIGN_C, border:true });
    setCell(ws, `B${r}`, "시나리오", scenHdr); mergeCells(ws, `B${r}:C${r}`);
    setCell(ws, `D${r}`, "일반 카드 사용 합계", scenHdr);
    setCell(ws, `E${r}`, "공제 결과", scenHdr);
    r++;
    const scenarios = [
      ["A. 현재 사용 (실제 데이터)", cardsTotal, "한도 도달 (적용 공제 한도와 동일)"],
      ["B. 한도 달성 최소 사용",      required,   "한도 도달 (동일 공제)"],
      ["C. 25% 문턱 미만",            scenC,      "공제 없음 (문턱 미달)"],
    ];
    scenarios.forEach(([name, amt, result], i) => {
      const isHighlight = i === 1;
      const fill = isHighlight ? RESULT_FILL : undefined;
      setCell(ws, `B${r}`, name, S({ align:ALIGN_L, border:true, bold:isHighlight, fill })); mergeCells(ws, `B${r}:C${r}`);
      setCell(ws, `D${r}`, amt, S({ align:ALIGN_R, border:true, bold:isHighlight, color:"0000FF", fmt:'#,##0', fill }));
      setCell(ws, `E${r}`, result, S({ align:ALIGN_L, border:true, bold:isHighlight, fill }));
      r++;
    });

    r++;
    setCell(ws, `B${r}`,
      "※ 분석 원리 — 25% 문턱까지는 공제율이 낮은 신용카드(15%)부터 흡수되어 공제 기여가 0이 됩니다. " +
      "문턱을 넘는 사용분만 한계공제율 30%로 누적되어 한도에 도달합니다. " +
      "전통시장·대중교통은 각각 별도 100만원 한도가 있어 본 분석에서는 제외했습니다. " +
      "※ 이 시트의 값은 변환 시점의 계산 결과이며 동적 수식이 아닙니다 — 다른 입력값으로 보려면 새 파일을 업로드해 주세요.",
      S({ italic:true, size:10, color:"555555", align:{ horizontal:"left", vertical:"center", wrapText:true } }));
    mergeCells(ws, `B${r}:E${r}`); setRowHeight(ws, r, 70);

    setRange(ws, `A1:E${r}`);
    XLSX.utils.book_append_sheet(wb, ws, "8.초과사용액분석");
  }

  return wb;
}

// ============================================================
//  UI 와이어업
// ============================================================
const dropzone    = document.getElementById("dropzone");
const fileInput   = document.getElementById("fileInput");
const filename    = document.getElementById("filename");
const processBtn  = document.getElementById("processBtn");
const downloadBtn = document.getElementById("downloadBtn");
const resetBtn    = document.getElementById("resetBtn");
const status      = document.getElementById("status");
const preview     = document.getElementById("preview");
const previewTbl  = document.getElementById("previewTable");

let currentFile  = null;
let generatedWb  = null;
let outFileName  = "";
let extracted    = null;

function showStatus(type, html) {
  status.className = `status ${type} show`;
  status.innerHTML = html;
}
function clearStatus() { status.className = "status"; }

function setFile(f) {
  currentFile = f;
  generatedWb = null;
  downloadBtn.disabled = true;
  if (!f) {
    filename.classList.remove("show");
    processBtn.disabled = true;
    return;
  }
  filename.textContent = `📎 ${f.name}  (${(f.size/1024).toFixed(1)} KB)`;
  filename.classList.add("show");
  processBtn.disabled = false;
  clearStatus();
  preview.classList.remove("show");
}

fileInput.addEventListener("change", (e) => {
  if (e.target.files[0]) setFile(e.target.files[0]);
});
["dragover", "dragenter"].forEach(ev =>
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add("drag"); })
);
["dragleave", "drop"].forEach(ev =>
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove("drag"); })
);
dropzone.addEventListener("drop", (e) => {
  const f = e.dataTransfer.files[0];
  if (f) { fileInput.files = e.dataTransfer.files; setFile(f); }
});

resetBtn.addEventListener("click", () => {
  fileInput.value = "";
  setFile(null);
  clearStatus();
  preview.classList.remove("show");
  generatedWb = null; extracted = null; outFileName = "";
  downloadBtn.disabled = true;
});

processBtn.addEventListener("click", async () => {
  if (!currentFile) return;
  processBtn.disabled = true;
  downloadBtn.disabled = true;
  generatedWb = null;
  showStatus("info", "🔄 파일을 읽고 변환 중…");

  try {
    const buf = await currentFile.arrayBuffer();
    const wbIn = XLSX.read(buf, { type: "array" });
    extracted = parseInput(wbIn);

    const preview_keys = [
      ["S001", "급여소득"],
      ["S002", "상여소득"],
      ["S030", "총급여액"],
      ["G001", "근로소득공제"],
      ["S301", "근로소득"],
      ["G211", "과세표준"],
      ["G212", "산출세액"],
      ["G232", "신용카드등공제액 (한도적용)"],
      ["G309", "세액공제 합계"],
      ["G901", "결정세액(소득세)"],
      ["G910", "차감_소득세(환급/납부)"],
      ["G911", "차감_지방소득세"],
    ];
    let html = "<tr><th>코드</th><th>항목</th><th style='text-align:right'>금액(원)</th></tr>";
    preview_keys.forEach(([code, name]) => {
      const val = extracted[code];
      const cls = (typeof val === "number" && val < 0) ? "num neg" : "num";
      const display = (typeof val === "number") ? val.toLocaleString() : "—";
      html += `<tr><td>${code}</td><td>${name}</td><td class="${cls}">${display}</td></tr>`;
    });
    previewTbl.innerHTML = html;
    preview.classList.add("show");

    showStatus("info", "📝 9개 시트 재구성 중…");
    generatedWb = buildOutput(extracted);
    outFileName = currentFile.name.replace(/\.[^.]+$/, "") + "_계산흐름재구성.xlsx";

    showStatus("ok",
      `✅ 변환 완료! 아래에서 추출된 주요 항목을 확인하신 후 <b>📥 결과 파일 다운로드</b> 버튼을 눌러 ` +
      `<b>${outFileName}</b> 파일을 받으세요.<br>` +
      `9개 시트(한눈에보기 → 환급 → 초과사용액분석)로 정리되어 있습니다.`);
    downloadBtn.disabled = false;
  } catch (err) {
    console.error(err);
    showStatus("err", `❌ 처리 중 오류가 발생했습니다.<br><code>${err.message}</code>`);
  } finally {
    processBtn.disabled = false;
  }
});

downloadBtn.addEventListener("click", () => {
  if (!generatedWb || !outFileName) return;
  try {
    XLSX.writeFile(generatedWb, outFileName);
    showStatus("ok", `📥 <b>${outFileName}</b> 파일이 다운로드 폴더에 저장되었습니다.`);
  } catch (err) {
    console.error(err);
    showStatus("err", `❌ 다운로드 중 오류: <code>${err.message}</code>`);
  }
});
</script>
